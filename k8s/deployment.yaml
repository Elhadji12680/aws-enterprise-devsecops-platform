apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupiter-app
  namespace: jupiter
  labels:
    app: jupiter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jupiter
  template:
    metadata:
      labels:
        app: jupiter
    spec:
      containers:
        - name: jupiter
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/jupiter-app:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
