name: Deploy to EKS

# Pipeline is DISABLED for auto-triggers — run manually only.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. v1.0.0)"
        required: true
        default: "latest"
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: jupiter-eks-cluster
  ECR_REPOSITORY: jupiter-app

jobs:
  deploy:
    name: Deploy to EKS (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update deployment image tag
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/jupiter-app \
            jupiter=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }} \
            -n jupiter

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/jupiter-app -n jupiter --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n jupiter
          kubectl get svc -n jupiter
