<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jupiter App</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 40px; text-align: center; max-width: 480px; }
    h1 { color: #58a6ff; }
    p { color: #8b949e; }
    .badge { display: inline-block; background: #238636; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Jupiter App</h1>
    <p>Deployed via ArgoCD on EKS</p>
    <span class="badge">Running</span>
  </div>
</body>
</html>
