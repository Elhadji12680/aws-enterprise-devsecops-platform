apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupiter-app
  namespace: jupiter
  labels:
    app: jupiter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jupiter
  template:
    metadata:
      labels:
        app: jupiter
    spec:
      containers:
        - name: jupiter
          image: httpd:2.4-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
