name: Terraform Force Unlock

on:
  workflow_dispatch:
    inputs:
      lock_id:
        description: "Terraform state lock ID to force-unlock (find it in the error message or S3 .tflock file)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  unlock:
    runs-on: ubuntu-latest
    environment: development

    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Setup Terraform — pinned to >=1.10 for S3 native state locking (use_lockfile)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      # 4️⃣ Terraform Init (required to access backend)
      - name: Terraform Init
        run: terraform init -input=false

      # 5️⃣ Select workspace
      - name: Select Workspace
        run: terraform workspace select -or-create dev

      # 6️⃣ Force unlock state
      # With S3 native locking (use_lockfile=true), the lock is stored as a
      # .tflock file in the S3 bucket alongside the state file
      - name: Force Unlock Terraform State
        run: terraform force-unlock -force ${{ github.event.inputs.lock_id }}
